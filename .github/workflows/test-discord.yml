name: Test Discord webhook

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Install requests
        run: pip install requests

      - name: Send Discord test message
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          python3 - <<'PY'
          import os
          import requests

          url = os.environ.get("DISCORD_WEBHOOK_URL", "").strip()

          print("Webhook exists:", bool(url))
          print("Starts correctly:", url.startswith("https://discord.com/api/webhooks/"))

          if not url:
              raise SystemExit("DISCORD_WEBHOOK_URL is empty or missing")

          response = requests.post(
              url,
              json={"content": "test from GitHub Actions apartment bot"},
              headers={"User-Agent": "woldring-apartment-bot/1.0"},
              timeout=30,
          )

          print("Status:", response.status_code)
          print("Response:", response.text)
          response.raise_for_status()
          PY
